<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg" width="200" height="240">
  <defs>
	<linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
	  <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
	  <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
	</linearGradient>
  </defs>

  <!-- Main rounded background with gradient -->
  <path d="M 40 20 Q 20 20 20 40 L 20 140 Q 20 160 40 160 L 120 160 Q 140 160 140 140 L 140 20 Q 140 20 120 20 Z" 
		fill="url(#logoGradient)" opacity="0.8"/>

  <!-- Top right curve -->
  <ellipse cx="140" cy="40" rx="35" ry="50" fill="url(#logoGradient)" opacity="0.6" transform="rotate(-20 140 40)"/>

  <!-- Bottom right accent -->
  <path d="M 130 140 Q 150 140 160 120 Q 170 100 160 80 Q 150 70 140 80 Z" 
		fill="url(#logoGradient)" opacity="0.7"/>

  <!-- Contact icon (spiral binding on left) -->
  <rect x="35" y="50" width="15" height="8" rx="4" fill="white"/>
  <rect x="35" y="70" width="15" height="8" rx="4" fill="white"/>
  <rect x="35" y="90" width="15" height="8" rx="4" fill="white"/>

  <!-- Person icon inside -->
  <circle cx="95" cy="60" r="12" fill="white"/>
  <path d="M 75 90 Q 75 80 95 80 Q 115 80 115 90 L 115 110 Q 115 120 95 120 Q 75 120 75 110 Z" 
		fill="white"/>

  <!-- Text: Contactify -->
  <text x="100" y="190" font-family="Arial, sans-serif" font-size="44" font-weight="700" 
		text-anchor="middle" fill="#4F46E5">Contact</text>
  <text x="132" y="190" font-family="Arial, sans-serif" font-size="44" font-weight="700" 
		text-anchor="start" fill="#A855F7">ify</text>
</svg>
