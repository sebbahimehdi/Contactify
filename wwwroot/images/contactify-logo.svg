<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
	<linearGradient id="contactifyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
	  <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
	  <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
	</linearGradient>
	<filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
	  <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.15"/>
	</filter>
  </defs>

  <!-- Outer rounded shape background (left side - blue) -->
  <path d="M 80 60 Q 40 60 40 100 L 40 380 Q 40 420 80 420 L 240 420 Q 280 420 280 380 L 280 60 Q 280 60 240 60 Z" 
		fill="#2563EB" filter="url(#shadow)"/>

  <!-- Top right curve accent (purple) -->
  <ellipse cx="300" cy="100" rx="90" ry="120" fill="#A855F7" filter="url(#shadow)"/>

  <!-- Bottom right accent piece -->
  <path d="M 280 360 Q 320 360 360 320 Q 400 280 360 240 Q 320 220 280 280 Z" 
		fill="#A855F7" opacity="0.9" filter="url(#shadow)"/>

  <!-- Inner white rounded rectangle (contact book) -->
  <rect x="120" y="120" width="240" height="280" rx="30" fill="white"/>

  <!-- Spiral binding holes on left (3 circles) -->
  <circle cx="150" cy="180" r="18" fill="white" stroke="url(#contactifyGradient)" stroke-width="12"/>
  <circle cx="150" cy="256" r="18" fill="white" stroke="url(#contactifyGradient)" stroke-width="12"/>
  <circle cx="150" cy="332" r="18" fill="white" stroke="url(#contactifyGradient)" stroke-width="12"/>

  <!-- Contact person icon inside -->
  <!-- Head -->
  <circle cx="280" cy="200" r="32" fill="url(#contactifyGradient)"/>
  <!-- Body/shoulders -->
  <path d="M 248 280 Q 248 240 280 240 Q 312 240 312 280 L 312 340 Q 312 360 280 360 Q 248 360 248 340 Z" 
		fill="url(#contactifyGradient)"/>

  <!-- Right side accent bars (semi-transparent purple) -->
  <rect x="340" y="180" width="35" height="45" rx="12" fill="#C084FC" opacity="0.6"/>
  <rect x="340" y="260" width="35" height="45" rx="12" fill="#C084FC" opacity="0.5"/>
</svg>
