<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
	<linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
	  <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
	  <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
	</linearGradient>
  </defs>

  <rect width="256" height="256" fill="#FFFFFF"/>

  <!-- Outer rounded shape background -->
  <path d="M 40 30 Q 20 30 20 50 L 20 190 Q 20 210 40 210 L 120 210 L 140 210 Q 160 210 160 190 L 160 30 Q 160 30 140 30 Z" 
		fill="url(#faviconGradient)"/>

  <!-- Top right accent -->
  <ellipse cx="150" cy="60" rx="50" ry="70" fill="#A855F7" opacity="0.8"/>

  <!-- Bottom right accent -->
  <path d="M 140 180 Q 160 180 180 160 Q 200 140 180 120 Q 160 110 140 140 Z" 
		fill="#A855F7" opacity="0.7"/>

  <!-- Inner white area -->
  <rect x="60" y="60" width="120" height="140" rx="15" fill="white"/>

  <!-- Spiral binding -->
  <circle cx="75" cy="85" r="9" fill="url(#faviconGradient)"/>
  <circle cx="75" cy="128" r="9" fill="url(#faviconGradient)"/>
  <circle cx="75" cy="171" r="9" fill="url(#faviconGradient)"/>

  <!-- Person icon -->
  <circle cx="140" cy="100" r="15" fill="url(#faviconGradient)"/>
  <path d="M 125 140 Q 125 125 140 125 Q 155 125 155 140 L 155 170 Q 155 178 140 178 Q 125 178 125 170 Z" 
		fill="url(#faviconGradient)"/>
</svg>
